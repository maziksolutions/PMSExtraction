name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy to staging after build?"
        required: false
        default: "false"
        type: boolean

jobs:
  # ----------------------------------------------------------------
  # 1. Backend tests
  # ----------------------------------------------------------------
  backend-test:
    name: Backend — Python Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pms_test
          POSTGRES_USER: pms_user
          POSTGRES_PASSWORD: pms_password_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pms_user -d pms_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://pms_user:pms_password_test@localhost:5432/pms_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-for-ci-only-32chars

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest --tb=short -q

  # ----------------------------------------------------------------
  # 2. Frontend build + lint
  # ----------------------------------------------------------------
  frontend-test:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ----------------------------------------------------------------
  # 3. Docker build & tag
  # ----------------------------------------------------------------
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: |
            maritime-pms-backend:latest
            maritime-pms-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: |
            maritime-pms-frontend:latest
            maritime-pms-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------
  # 4. Deploy to staging (manual trigger only)
  # ----------------------------------------------------------------
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_staging == 'true'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Azure Container Registry
        run: |
          echo "Logging in to Azure Container Registry..."
          echo "az acr login --name \$ACR_NAME"
          # Replace with: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Push backend image to registry
        run: |
          echo "Tagging and pushing backend image..."
          echo "docker tag maritime-pms-backend:${{ github.sha }} \$ACR_NAME.azurecr.io/maritime-pms-backend:${{ github.sha }}"
          echo "docker push \$ACR_NAME.azurecr.io/maritime-pms-backend:${{ github.sha }}"

      - name: Push frontend image to registry
        run: |
          echo "Tagging and pushing frontend image..."
          echo "docker tag maritime-pms-frontend:${{ github.sha }} \$ACR_NAME.azurecr.io/maritime-pms-frontend:${{ github.sha }}"
          echo "docker push \$ACR_NAME.azurecr.io/maritime-pms-frontend:${{ github.sha }}"

      - name: Update Container App revision
        run: |
          echo "Updating Azure Container App to revision ${{ github.sha }}..."
          echo "az containerapp update --name maritime-pms-backend --resource-group \$RG_NAME --image \$ACR_NAME.azurecr.io/maritime-pms-backend:${{ github.sha }}"

      - name: Deployment complete
        run: |
          echo "Staging deployment of SHA ${{ github.sha }} complete."
          echo "Staging URL: https://staging.maritime-pms.unionmaritime.com"
