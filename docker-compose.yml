version: "3.9"

services:
  # ----------------------------------------------------------------
  # PostgreSQL 15
  # ----------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pms_extraction
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms_user -d pms_extraction"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # FastAPI backend
  # ----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pms_user:pms_password_dev@db:5432/pms_extraction
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:80"]'
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_HOURS: "8"
      RATE_LIMIT_PER_MINUTE: "100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Hot-reload: mount source so Uvicorn detects changes
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ----------------------------------------------------------------
  # React / Nginx frontend
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
